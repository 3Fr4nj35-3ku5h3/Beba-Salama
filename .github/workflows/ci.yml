name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check — src modules import and parse cleanly
        run: python -m compileall src

# Note: this is a minimal sanity check, not a test suite yet.
# Expand with pytest once src/ has functions worth unit testing
# (e.g. compute_severity, standardize_road_names).
